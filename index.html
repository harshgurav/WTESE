<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <p class="subtitle">Enter your weight and height to calculate your BMI</p>
        
        <div class="input-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter weight" min="0" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" placeholder="Enter height" min="0" step="0.1">
        </div>
        
        <button id="calculateBtn">Calculate</button>
        
        <div id="result" class="result hidden">
            <div class="bmi-value">Your BMI: <span id="bmiValue">--</span></div>
            <div class="bmi-category" id="bmiCategory">--</div>
            <button id="adviceBtn" class="advice-btn" style="margin-top:20px;display:none;">Get Tips / Advice</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
